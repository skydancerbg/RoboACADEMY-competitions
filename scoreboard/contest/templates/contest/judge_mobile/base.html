{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f1728">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RoboSTEAM Judge">
  <link rel="manifest" href="{% static 'contest/manifest.json' %}">
  <link rel="apple-touch-icon" href="{% static 'contest/img/robostem-academy.png' %}">
  {% block title %}<title>Judge — RoboSTEAM Academy</title>{% endblock %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'contest/css/judge_mobile.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
  {% block extra_js %}{% endblock %}
</body>
</html>
